<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOE Test Cognitivo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f3fa;
    --card: #ffffff;
    --primary: #2d5be3;
    --primary-dark: #1a3eb5;
    --accent: #e84545;
    --text: #1a2240;
    --muted: #5a6282;
    --border: #dde2f0;
    --success: #1a9e4a;
    --number-bg: #eaf0ff;
    --number-hover: #c8d9ff;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 16px 80px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: 0 8px 32px rgba(30,50,120,0.10);
    max-width: 680px;
    width: 100%;
    padding: 28px 24px;
  }

  /* ─── SELETTORE LINGUA ─── */
  .lang-selector {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 18px;
  }
  .lang-btn {
    padding: 5px 13px;
    border: 1.5px solid var(--border);
    border-radius: 99px;
    background: white;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .lang-btn:hover { border-color: var(--primary); color: var(--primary); }
  .lang-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  /* ─── INTRO ─── */
  .intro-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.3px;
  }

  .rules-list {
    list-style: none;
    margin-bottom: 20px;
  }
  .rules-list li {
    padding: 7px 0;
    font-size: 15px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rules-list li::before {
    content: '→';
    color: var(--primary);
    font-weight: 700;
    flex-shrink: 0;
  }

  .conditions-box {
    background: #eef2ff;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--primary-dark);
    margin-bottom: 20px;
    line-height: 1.7;
  }

  .legend-box {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 28px;
  }
  .legend-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }
  .sample-std {
    width: 52px; height: 52px;
    border-radius: 10px;
    background: #eaf1ff;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-family: Arial; color: #1a2240;
    box-shadow: 0 2px 8px rgba(45,92,227,0.10);
  }
  .sample-alt {
    width: 52px; height: 52px;
    border-radius: 10px;
    background: #fff0f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-family: 'Courier New'; color: #e84545;
    box-shadow: 0 2px 8px rgba(232,69,69,0.12);
  }

  /* ─── BOTTONE PRINCIPALE ─── */
  .btn-primary {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.2px;
    transition: background 0.18s, transform 0.12s;
    box-shadow: 0 4px 16px rgba(45,91,227,0.22);
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-sticky {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 420px;
    z-index: 999;
    padding: 15px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 6px 20px rgba(45,91,227,0.35);
    transition: background 0.18s;
  }
  .btn-sticky:hover { background: var(--primary-dark); }

  #info {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary-dark);
    background: #eef2ff;
    border-radius: 10px;
    padding: 12px 16px;
    line-height: 1.8;
    margin-bottom: 16px;
    white-space: pre-line;
  }

  #progressContainer { margin-bottom: 16px; display: none; }
  #progressBar {
    width: 100%; height: 7px;
    background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 5px;
  }
  #progressFill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary), #6b94ff);
    border-radius: 99px; transition: width 0.22s ease-out;
  }
  #progressText { font-size: 13px; color: var(--muted); font-weight: 500; }

  #instruction {
    font-size: 15px; font-weight: 600; color: var(--muted);
    margin-bottom: 12px; text-align: center;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px; margin-bottom: 16px;
  }

  .num-btn {
    aspect-ratio: 1;
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    border: none; border-radius: 9px;
    background: var(--number-bg); color: var(--text);
    cursor: pointer; transition: background 0.14s, transform 0.1s;
  }
  .num-btn:hover { background: var(--number-hover); transform: scale(1.07); }
  .num-btn:active { transform: scale(0.97); }

  @media (max-width: 560px) {
    #grid { grid-template-columns: repeat(5, 1fr); gap: 5px; }
    .num-btn { font-size: 17px; }
    .card { padding: 18px 14px; }
  }

  #finalArea { display: none; margin-top: 10px; }

  .congrats-msg {
    font-size: 20px; font-weight: 700;
    color: var(--text); margin-bottom: 20px; text-align: center;
  }

  #finalQuestions {
    background: #f5f7fb; padding: 18px; border-radius: 12px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .field-group label {
    display: block; font-size: 14px; font-weight: 600;
    color: var(--text); margin-bottom: 5px;
  }
  .field-group input {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    color: var(--text); background: white; transition: border-color 0.15s;
  }
  .field-group input:focus { outline: none; border-color: var(--primary); }

  #panel {
    display: none; margin-top: 20px;
    background: #eef2ff; border-radius: 12px; padding: 20px; text-align: center;
  }
  #finalTime {
    font-size: 26px; font-weight: 700;
    color: var(--primary-dark); margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
  }
  #sendStatus {
    font-size: 14px; font-weight: 500;
    margin-bottom: 14px; min-height: 20px; color: var(--muted);
  }
  #sendStatus.ok { color: var(--success); }
  #sendStatus.err { color: var(--accent); }

  .btn-download {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #1a9e4a, #22c55e);
    color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    box-shadow: 0 4px 12px rgba(26,158,74,0.22);
    transition: opacity 0.15s;
  }
  .btn-download:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="card">

  <!-- ══ INTRO ══ -->

    <!-- Selettore lingua -->
    <div class="lang-selector">
      <button class="lang-btn active" onclick="setLang('it')">🇮🇹 IT</button>

    <button class="btn-sticky" id="btnStartIntro" onclick="showTest()"></button>

  <!-- ══ FASE TEST ══ -->
  <div id="testPhase" style="display:none;">
    <div id="info"></div>

    <div id="progressContainer">
      <div id="progressBar"><div id="progressFill"></div></div>
      <p id="progressText"></p>
    </div>

    <button class="btn-primary" id="startBtn" onclick="startTest()" style="display:none; margin-bottom:16px;"></button>

    <div id="test" style="display:none;">
      <p id="instruction"></p>
      <div id="grid"></div>
    </div>

    <!-- Area finale -->
    <div id="finalArea">
      <p class="congrats-msg" id="congrats"></p>

      <div id="finalQuestions">
        <div class="field-group">
          <label id="lblCaffeina"></label>
          <input id="caffeinaInput" type="text" maxlength="3">

        <div class="field-group">
          <label id="lblSesso"></label>

        <div class="field-group">
          <label id="lblEta"></label>
          <input id="etaInput" type="text" maxlength="1">
        </div>
        <button class="btn-primary" id="confirmAnswers"></button>
      </div>

      <div id="panel">
        <div id="finalTime"></div>
        <div id="sendStatus"></div>
        <button class="btn-download" onclick="downloadCSV()" id="btnDownload"></button>
      </div>
    </div>
  </div>

</div><!-- /card -->

// ══════════════════════════════════════════════

    conditions:  "<strong>Condiciones experimentales:</strong><br>• Entradas visuales: Sí / No<br>• Orden: Ascendente (1→50) o Descendente (50→1)",

    errSesso:    "Responde 'M' o 'F' para el sexo",
    errEta:      "Responde 'J' o 'M' para la edad",

// ══════════════════════════════════════════════
const colori    = ["red","blue","green","#7b00d4","#e07b00"];
const dimensioni= ["16px","20px","26px","32px","40px"];
const fonts     = ["Arial","Courier New","Georgia","Verdana","Tahoma"];
const TOTALE    = 50;

let lang      = "it";
let startTime = null;
let current;
let condizione;
let dati = [];

// ── Imposta lingua ──
function setLang(l) {
  lang = l;
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".lang-btn")[["it","en","es"].indexOf(l)].classList.add("active");
  renderIntro();
}

function renderIntro() {
  const t = T[lang];
  document.getElementById("lblTitle").textContent = t.title;

  const ul = document.getElementById("rulesList");
  ul.innerHTML = "";
  t.rules.forEach(r => {
    const li = document.createElement("li");
    li.textContent = r;
    ul.appendChild(li);
  });

  document.getElementById("lblConditions").innerHTML  = t.conditions;
  document.getElementById("lblStandard").textContent  = t.lblStandard;
  document.getElementById("lblAltered").textContent   = t.lblAltered;
  document.getElementById("btnStartIntro").textContent = t.btnStart;
}

document.addEventListener("DOMContentLoaded", () => {
  condizione = {
    direzione:   Math.random() < 0.5 ? "up" : "down",
    inputVisivi: Math.random() < 0.5 ? "no"  : "si"
  };
  renderIntro();
});

// ── Mostra fase test ──
function showTest() {
  const t = T[lang];
  document.getElementById("intro").style.display     = "none";
  document.getElementById("testPhase").style.display = "block";

  const startBtn = document.getElementById("startBtn");
  startBtn.textContent   = t.btnAvvia;
  startBtn.style.display = "block";

  const v = condizione.inputVisivi === "si" ? t.infoVisivi : t.infoNo;
  const o = condizione.direzione   === "up" ? t.orderUp    : t.orderDown;
  document.getElementById("info").innerText =
    t.infoLabel.replace("{v}", v).replace("{o}", o);

  // Prepara label form finale
  document.getElementById("lblCaffeina").textContent     = t.lblCaffeina;
  document.getElementById("caffeinaInput").placeholder   = t.caffPlaceholder;
  document.getElementById("lblSesso").textContent        = t.lblSesso;
  document.getElementById("lblEta").innerHTML =
    'Età <span style="font-weight:400;color:var(--muted)">' + t.lblEta.split("(")[1].replace(")", "") + "</span>";
  if (lang !== "it") {
    document.getElementById("lblEta").innerHTML =
      t.lblEta.split("(")[0] +
      '<span style="font-weight:400;color:var(--muted)">(' + t.lblEta.split("(")[1] + "</span>";
  }
  document.getElementById("etaInput").placeholder        = t.etaPlaceholder;
  document.getElementById("confirmAnswers").textContent  = t.btnConferma;
  document.getElementById("btnDownload").textContent     = t.btnDownload;
}

function startTest() {
  const t = T[lang];
  document.getElementById("startBtn").style.display          = "none";
  document.getElementById("test").style.display              = "block";
  document.getElementById("progressContainer").style.display = "block";
  document.getElementById("progressFill").style.width        = "0%";
  document.getElementById("progressText").innerText          = t.progressNone;

  startTime = null;
  current   = condizione.direzione === "up" ? 1 : 50;

  document.getElementById("instruction").innerText =
    condizione.direzione === "up" ? t.instrUp : t.instrDown;

  const numeri = Array.from({length: 50}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
  const grid   = document.getElementById("grid");
  grid.innerHTML = "";

  numeri.forEach(n => {
    const btn = document.createElement("button");
    btn.textContent = n;
    btn.className   = "num-btn";
    if (condizione.inputVisivi === "si") {
      btn.style.color      = colori[Math.floor(Math.random() * colori.length)];
      btn.style.fontSize   = dimensioni[Math.floor(Math.random() * dimensioni.length)];
      btn.style.fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
    }
    btn.onclick = () => handleClick(n, btn);
    grid.appendChild(btn);
  });
}

function handleClick(n, btn) {
  if (n !== current) return;
  const t = T[lang];

  if (startTime === null) startTime = performance.now();
  btn.style.visibility = "hidden";

  const cliccati = condizione.direzione === "up" ? n : (TOTALE + 1 - n);
  const percent  = (cliccati / TOTALE) * 100;
  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").innerText   =
    t.progressTxt.replace("{c}", cliccati).replace("{t}", TOTALE).replace("{n}", n);

  current = condizione.direzione === "up" ? current + 1 : current - 1;

  if (current === 51 || current === 0) {
    const tempo = ((performance.now() - startTime) / 1000).toFixed(2);
    window.tempoFinale = tempo;

    document.getElementById("test").style.display              = "none";
    document.getElementById("progressContainer").style.display = "none";
    document.getElementById("finalArea").style.display         = "block";
    document.getElementById("congrats").innerHTML              = t.congrats;

    document.getElementById("confirmAnswers").onclick = function() {
      const risposte = validateFinalAnswers();
      if (!risposte) return;

      const record = {
        tempo:       window.tempoFinale,
        direzione:   condizione.direzione,
        inputVisivi: condizione.inputVisivi,
        caffeina:    risposte.caffeina,
        sesso:       risposte.sesso,
        eta:         risposte.eta,
        lingua:      lang,
        timestamp:   new Date().toLocaleString("it-IT")
      };
      dati.push(record);

      document.getElementById("finalQuestions").style.display = "none";
      document.getElementById("panel").style.display          = "block";
      document.getElementById("finalTime").innerHTML          = "⏱ " + window.tempoFinale + "s";

      inviaDati(record);
    };
  }
}

function validateFinalAnswers() {
  const t = T[lang];
  const c = document.getElementById("caffeinaInput").value.trim().toLowerCase();
  const s = document.getElementById("sessoInput").value.trim().toLowerCase();
  const e = document.getElementById("etaInput").value.trim().toLowerCase();
  if (!t.caffValues.includes(c)) { alert(t.errCaffeina); return null; }
  if (!["m","f"].includes(s))    { alert(t.errSesso);    return null; }
  if (!t.etaValues.includes(e))  { alert(t.errEta);      return null; }
  return { caffeina: c, sesso: s, eta: e };
}

function inviaDati(dato) {
  const t      = T[lang];
  const status = document.getElementById("sendStatus");
  status.textContent = t.sending;
  status.className   = "";

  const params = new URLSearchParams(dato).toString();
  const url    = APPS_SCRIPT_URL + "?" + params;

  fetch(url, { method: "GET", mode: "no-cors" })
    .then(() => {
      status.textContent = t.sent;
      status.className   = "ok";
    })
    .catch(err => {
      console.error("Errore invio:", err);
      status.textContent = t.sendErr;
      status.className   = "err";
    });
}

function downloadCSV() {
  if (!dati.length) return;
  let csv = "tempo,direzione,inputVisivi,caffeina,sesso,eta,lingua,timestamp\n";
  dati.forEach(r => {
    csv += `${r.tempo},${r.direzione},${r.inputVisivi},${r.caffeina},${r.sesso},${r.eta},${r.lingua},"${r.timestamp}"\n`;
  });
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "risultati_doe.csv"; a.click();
  URL.revokeObjectURL(url);
}
</script>
